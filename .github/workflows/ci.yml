name: CI

on:
  push:
    branches: [main, back-Fael]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: lint + tests ──────────────────────────────────────────────────
  backend:
    name: Backend – Test & Build
    runs-on: self-hosted

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV:             test
      DATABASE_URL:         file:./test.db
      JWT_SECRET:           testsecretatleast32characterslong000000
      JWT_EXPIRES_IN:       15m
      BCRYPT_ROUNDS:        4
      WELOVEDEVS_API_KEY:   test_key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (SQLite dev schema)
        run: npx prisma generate --schema prisma/schema.dev.prisma

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # ─── Frontend: build ────────────────────────────────────────────────────────
  frontend:
    name: Frontend – Build
    runs-on: self-hosted

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000
